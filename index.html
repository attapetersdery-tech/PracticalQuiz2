<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PracticalQuiz2 – A-Frame Scene</title>
  <script src="js/aframe.js"></script>
  <script>
    /* ═══════════════════════════════════════════════════════
       STEAM COMPONENT
       Creates animated rising puff particles from cup rim.
       Each puff: rises upward, fades out, and expands.
    ═══════════════════════════════════════════════════════ */
    AFRAME.registerComponent('steam', {
      schema: {
        count: { default: 9 },
        color: { default: '#e8e8e8' }
      },
      init: function () {
        var el   = this.el;
        var data = this.data;
        var cycle = 2600;   // ms per full rise cycle

        for (var i = 0; i < data.count; i++) {
          var frac  = i / data.count;
          var delay = Math.round(frac * cycle);

          // Random horizontal seed so puffs spread slightly
          var sx = ((Math.random() - 0.5) * 0.06).toFixed(3);
          var sz = ((Math.random() - 0.5) * 0.06).toFixed(3);
          var ex = (parseFloat(sx) + (Math.random() - 0.5) * 0.10).toFixed(3);
          var ez = (parseFloat(sz) + (Math.random() - 0.5) * 0.10).toFixed(3);
          var r  = (0.016 + Math.random() * 0.018).toFixed(3);

          var puff = document.createElement('a-sphere');
          puff.setAttribute('radius', r);
          puff.setAttribute('position', sx + ' 0.08 ' + sz);
          puff.setAttribute('material',
            'color: ' + data.color + '; opacity: 0; transparent: true; shader: flat');

          // Rise
          puff.setAttribute('animation__rise', {
            property: 'position',
            from: sx + ' 0.08 ' + sz,
            to:   ex + ' 0.56 ' + ez,
            loop: true, dur: cycle, delay: delay, easing: 'easeOutSine'
          });
          // Fade out
          puff.setAttribute('animation__fade', {
            property: 'material.opacity',
            from: 0.80, to: 0,
            loop: true, dur: cycle, delay: delay, easing: 'easeInSine'
          });
          // Expand
          puff.setAttribute('animation__scale', {
            property: 'scale',
            from: '0.35 0.35 0.35', to: '2.8 2.8 2.8',
            loop: true, dur: cycle, delay: delay, easing: 'easeOutSine'
          });

          el.appendChild(puff);
        }
      }
    });

    /* ═══════════════════════════════════════════════════════
       FLAP COMPONENT — butterfly wing animation
    ═══════════════════════════════════════════════════════ */
    AFRAME.registerComponent('flap', {
      schema: { speed: { default: 380 }, delay: { default: 0 } },
      init: function () {
        this.el.setAttribute('animation__flap', {
          property: 'rotation',
          from: '0 -65 0', to: '0 65 0',
          loop: true, dir: 'alternate',
          dur: this.data.speed, delay: this.data.delay,
          easing: 'easeInOutSine'
        });
      }
    });
  </script>
</head>
